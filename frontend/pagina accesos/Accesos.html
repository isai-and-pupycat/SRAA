<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Pagina de Accesos</title>
        <meta name="description" content="Pagina de accesos">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: Arial, sans-serif;
                background: #f4f6fb;
                color: #1f315b;
            }
            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: #0c2c63;
                padding: 12px 20px;
                min-height: 80px;
            }
            .topbar-left,
            .topbar-right {
                width: 120px;
            }
            .topbar-center {
                flex: 1;
                display: flex;
                justify-content: center;
            }
            .topbar-center img {
                max-height: 60px;
                width: auto;
            }
            .brand-title {
                text-align: center;
                margin: 24px auto 32px;
                max-width: 800px;
                font-size: 1.6rem;
                font-weight: 700;
                letter-spacing: 0.02em;
                
            }
        </style>
    </head>
    <body>
        <header class="topbar">
            <div class="topbar-left"></div>
            <div class="topbar-center">
                <img src="img/logo-horizontal-upb@2x.png" alt="Logo institucional">
            </div>
            <div class="topbar-right"></div>
        </header>

        <div class="brand-title">Portal de Sistemas Institucionales</div>
    </body>
</html>
